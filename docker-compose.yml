services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://temuser:tempass@db:5432/temdb
      - NODE_ENV=production
      - DEMO_AUTH_ENABLED=true
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=temuser
      - POSTGRES_PASSWORD=tempass
      - POSTGRES_DB=temdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temuser -d temdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
